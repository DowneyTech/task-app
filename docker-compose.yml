services:
  db:
    image: postgres:16-alpine
    container_name: taskapp-db
    environment:
      POSTGRES_USER: taskapp
      POSTGRES_PASSWORD: taskapp
      POSTGRES_DB: taskapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: taskapp-api
    environment:
      DATABASE_URL: "postgresql://taskapp:taskapp@db:5432/taskapp"
      JWT_SECRET: "change-this-to-a-secure-random-string"
      API_PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: pnpm dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: taskapp-web
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - api
    command: pnpm dev

volumes:
  postgres_data:
